name: Release SkiNav Indexes

on:
  schedule:
    - cron: "0 0 1 * *"
  workflow_dispatch:
    inputs:
      dataset_version:
        description: "Dataset version. Defaults to current UTC date."
        required: false
        type: string
  pull_request:
    paths:
      - ".github/workflows/release-indexes.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "src/**"
      - "README.md"

permissions:
  contents: read

jobs:
  smoke:
    name: Rust smoke checks
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal

      - name: Build CLI
        run: cargo build --locked

      - name: Run tests
        run: cargo test --locked

      - name: Check CLI help
        run: |
          cargo run --locked -- --help
          cargo run --locked -- fetch --help
          cargo run --locked -- build --help
          cargo run --locked -- validate --help
          cargo run --locked -- all --help

      - name: Delete generated runner data
        if: always()
        shell: bash
        run: |
          rm -rf target output data/raw/openskimap

  update:
    name: Update SkiNav indexes
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve release settings
        id: settings
        shell: bash
        run: |
          set -euo pipefail
          dataset_version="${{ inputs.dataset_version }}"
          if [ -z "$dataset_version" ]; then
            dataset_version="$(date -u +%F)"
          fi
          echo "dataset_version=${dataset_version}" >> "$GITHUB_OUTPUT"
          echo "release_tag=indexes-${dataset_version}" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal

      - name: Build, validate, and package from OpenSkiMap GeoJSON
        run: |
          cargo run --release --locked -- all --dataset-version "${{ steps.settings.outputs.dataset_version }}"

      - name: Collect release metadata
        id: metadata
        shell: bash
        run: |
          set -euo pipefail
          hash="$(sha256sum output/resorts.json | cut -d' ' -f1)"
          size="$(wc -c < output/resorts.json | tr -d ' ')"
          count="$(python -c 'import json; print(json.load(open("output/resorts.json"))["total_resorts"])')"
          timestamp="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          echo "hash=${hash}" >> "$GITHUB_OUTPUT"
          echo "size=${size}" >> "$GITHUB_OUTPUT"
          echo "count=${count}" >> "$GITHUB_OUTPUT"
          echo "timestamp=${timestamp}" >> "$GITHUB_OUTPUT"

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.settings.outputs.dataset_version }}"
          mkdir -p release/index
          cp output/latest.json release/index/latest.json
          cp output/resorts.json release/index/resorts.json
          cp output/build-report.json release/index/build-report.json
          cp output/release-packs/manifest.json release/index/release-pack-manifest.json
          {
            echo "# SkiNavIndexes ${version}"
            echo
            echo "Generated from OpenSkiMap GeoJSON on $(date -u +%Y-%m-%dT%H:%M:%SZ)."
            echo
            echo "- Total resorts: ${{ steps.metadata.outputs.count }}"
            echo "- SHA256: ${{ steps.metadata.outputs.hash }}"
            echo "- Discovery index: resorts.json"
            echo "- Release pack manifest: release-pack-manifest.json"
            echo "- Release packs: balanced output/release-packs/*.tar.gz assets"
          } > release/RELEASE_NOTES.md

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.settings.outputs.release_tag }}"
          title="SkiNavIndexes ${{ steps.settings.outputs.dataset_version }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            for stale_asset in \
              "group-manifest.json" \
              "local-app-manifest.json" \
              "skinavindexes-groups-${{ steps.settings.outputs.dataset_version }}.tar.gz" \
              "skinavindexes-local-app-${{ steps.settings.outputs.dataset_version }}.tar.gz"
            do
              gh release delete-asset "$tag" "$stale_asset" --yes >/dev/null 2>&1 || true
            done
            for stale_group_asset in $(gh release view "$tag" --json assets --jq '.assets[].name | select(test("^(small-groups-|[A-Z0-9]{2}[-_A-Z0-9]*).*\\.tar\\.gz$"))'); do
              gh release delete-asset "$tag" "$stale_group_asset" --yes >/dev/null 2>&1 || true
            done
            gh release upload "$tag" release/index/* output/release-packs/*.tar.gz --clobber
            gh release edit "$tag" --title "$title" --notes-file release/RELEASE_NOTES.md --target "$GITHUB_SHA"
          else
            gh release create "$tag" release/index/* output/release-packs/*.tar.gz \
              --title "$title" \
              --notes-file release/RELEASE_NOTES.md \
              --target "$GITHUB_SHA"
          fi

      - name: Update root latest.json entrypoint
        if: github.ref_name == github.event.repository.default_branch
        shell: bash
        run: |
          set -euo pipefail
          cp output/latest.json latest.json
          if git diff --quiet -- latest.json; then
            echo "latest.json already matches generated release metadata"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add latest.json
          git commit -m "Update latest.json for ${{ steps.settings.outputs.dataset_version }}"
          git push origin HEAD:${{ github.event.repository.default_branch }}

      - name: Delete generated runner data
        if: always()
        shell: bash
        run: |
          rm -rf release output data/raw/openskimap target
