name: Release SkiNav Indexes

on:
  workflow_dispatch:
    inputs:
      dataset_version:
        description: "Dataset version/cache namespace. Defaults to current UTC date."
        required: false
        type: string
      publish_release:
        description: "Create or update a GitHub release with generated artifacts."
        required: true
        default: false
        type: boolean
      release_tag:
        description: "Release tag. Defaults to indexes-<dataset_version>."
        required: false
        type: string
  pull_request:
    paths:
      - ".github/workflows/release-indexes.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "src/**"
      - "README.md"

permissions:
  contents: write

jobs:
  smoke:
    name: Rust smoke checks
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build CLI
        run: cargo build --locked

      - name: Run tests
        run: cargo test --locked

      - name: Check CLI help
        run: |
          cargo run --locked -- --help
          cargo run --locked -- fetch --help
          cargo run --locked -- build --help
          cargo run --locked -- validate --help
          cargo run --locked -- all --help

  release:
    name: Build release artifacts
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    timeout-minutes: 120

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve release settings
        id: settings
        shell: bash
        run: |
          set -euo pipefail
          dataset_version="${{ inputs.dataset_version }}"
          if [ -z "$dataset_version" ]; then
            dataset_version="$(date -u +%F)"
          fi
          release_tag="${{ inputs.release_tag }}"
          if [ -z "$release_tag" ]; then
            release_tag="indexes-${dataset_version}"
          fi
          echo "dataset_version=${dataset_version}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache OpenSkiMap source snapshot
        uses: actions/cache@v4
        with:
          path: data/raw/openskimap/${{ steps.settings.outputs.dataset_version }}
          key: openskimap-${{ steps.settings.outputs.dataset_version }}

      - name: Build, validate, and package from OpenSkiMap GeoJSON
        run: |
          cargo run --release --locked -- all --dataset-version "${{ steps.settings.outputs.dataset_version }}"

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.settings.outputs.dataset_version }}"
          mkdir -p release/index
          cp output/latest.json release/index/latest.json
          cp output/resorts.json release/index/resorts.json
          cp output/build-report.json release/index/build-report.json
          python3 - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          version = os.environ["DATASET_VERSION"]
          group_dir = Path("output/groups")
          groups = []
          for path in sorted(group_dir.glob("*.tar.gz")):
              digest = hashlib.sha256(path.read_bytes()).hexdigest()
              groups.append({
                  "groupId": path.name.removesuffix(".tar.gz"),
                  "assetName": path.name,
                  "size": path.stat().st_size,
                  "hash": f"sha256:{digest}",
              })
          manifest = {
              "version": version,
              "assetBaseUrl": f"https://github.com/obewi/SkiNavIndexes/releases/download/indexes-{version}",
              "groupCount": len(groups),
              "groups": groups,
          }
          Path("release/index/group-manifest.json").write_text(
              json.dumps(manifest, indent=2, sort_keys=True) + "\n"
          )
          PY
          {
            echo "# SkiNavIndexes ${version}"
            echo
            echo "Generated from OpenSkiMap GeoJSON on $(date -u +%Y-%m-%dT%H:%M:%SZ)."
            echo
            echo "- Discovery index: resorts.json"
            echo "- Group archive manifest: group-manifest.json"
            echo "- Group archives: individual output/groups/<group>.tar.gz release assets"
          } > release/RELEASE_NOTES.md
        env:
          DATASET_VERSION: ${{ steps.settings.outputs.dataset_version }}

      - name: Upload generated index artifact
        uses: actions/upload-artifact@v4
        with:
          name: skinavindexes-index-${{ steps.settings.outputs.dataset_version }}
          path: release/index
          if-no-files-found: error

      - name: Upload group archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: skinavindexes-groups-${{ steps.settings.outputs.dataset_version }}
          path: output/groups
          if-no-files-found: error

      - name: Publish GitHub release
        if: inputs.publish_release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.settings.outputs.release_tag }}"
          title="SkiNavIndexes ${{ steps.settings.outputs.dataset_version }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            for stale_asset in \
              "local-app-manifest.json" \
              "skinavindexes-groups-${{ steps.settings.outputs.dataset_version }}.tar.gz" \
              "skinavindexes-local-app-${{ steps.settings.outputs.dataset_version }}.tar.gz"
            do
              gh release delete-asset "$tag" "$stale_asset" --yes >/dev/null 2>&1 || true
            done
            gh release upload "$tag" release/index/* output/groups/*.tar.gz --clobber
            gh release edit "$tag" --title "$title" --notes-file release/RELEASE_NOTES.md --target "$GITHUB_SHA"
          else
            gh release create "$tag" release/index/* output/groups/*.tar.gz \
              --title "$title" \
              --notes-file release/RELEASE_NOTES.md \
              --target "$GITHUB_SHA"
          fi

      - name: Update root latest.json entrypoint
        if: inputs.publish_release && github.ref_name == github.event.repository.default_branch
        shell: bash
        run: |
          set -euo pipefail
          cp output/latest.json latest.json
          if git diff --quiet -- latest.json; then
            echo "latest.json already matches generated release metadata"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add latest.json
          git commit -m "Update latest.json for ${{ steps.settings.outputs.dataset_version }}"
          git push origin HEAD:${{ github.event.repository.default_branch }}
