name: Rust CLI Smoke Checks

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/update-resorts.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "src/**"
      - "README.md"

jobs:
  smoke:
    name: Build and test Rust CLI
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal

      - name: Build CLI
        run: cargo build --locked

      - name: Run tests
        run: cargo test --locked

      - name: Check CLI help
        run: |
          cargo run --locked -- --help
          cargo run --locked -- fetch --help
          cargo run --locked -- build --help
          cargo run --locked -- validate --help
          cargo run --locked -- all --help
